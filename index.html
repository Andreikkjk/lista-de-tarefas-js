<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Lista de Tarefas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Minha Lista de Tarefas</h1>
  <div id="tarefas">
    <h2>Tarefas Salvas</h2>
    <ul id="listaTarefas"></ul>
  </div>
  <div id="formTarefa">
    <h2>Adicionar Tarefa</h2>
    <input type="text" id="novaTarefa" placeholder="Digite uma nova tarefa">
    <button id="botaoAdicionar">Adicionar</button>
    <button id="botaoSalvar">Salvar</button>
    <button id="botaoLimpar">Limpar Tarefas</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
